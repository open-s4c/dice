name: Build and run some benchmarks
on: [push]
env:
  REGISTRY: ghcr.io

jobs:
  test-linux:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        cfg:
        - cc: gcc
          cxx: g++
        - cc: clang
          cxx: clang++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure
        run: cmake -S. -Bbuild
             -DCMAKE_INSTALL_PREFIX=/tmp/target
             -DCMAKE_C_COMPILER=${{ matrix.cfg.cc }}
             -DCMAKE_CXX_COMPILER=${{ matrix.cfg.cxx }}
             -DCMAKE_BUILD_TYPE=Release
             -DDICE_BENCHMARKS=on
             -DDICE_TESTS=off
      - name: Build
        run: cmake --build build
      - name: Run benchmarks
        run: sh scripts/benchmark.sh
      - name: Save results
        uses: actions/upload-artifact@v4
        with:
          path: bench-*.md
          name: bench-results

